<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Monitoring System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding-top: 30px;
            min-height: 70px;
            border-bottom: #e8491d 3px solid;
        }
        header a {
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 16px;
        }
        header ul {
            padding: 0;
            list-style: none;
            text-align: right;
        }
        header li {
            display: inline;
            padding: 0 20px 0 20px;
        }
        form {
            background: #ffffff;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        form input, form select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        form button {
            background: #35424a;
            color: #ffffff;
            border: 0;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }
        form button:hover {
            background: #e8491d;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>IoT Monitoring System</h1>
        </div>
    </header>

    <div class="container">
        <!-- Add Device Form -->
        <h2>Add Device</h2>
        <form action="add_device.php" method="POST">
            <label for="deviceType">Device Type:</label>
            <input type="text" id="deviceType" name="deviceType" required>

            <label for="status">Status:</label>
            <select id="status" name="status" required>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>

            <label for="lastMaintenanceDate">Last Maintenance Date:</label>
            <input type="date" id="lastMaintenanceDate" name="lastMaintenanceDate" required>

            <label for="powerConsumption">Power Consumption (W):</label>
            <input type="number" id="powerConsumption" name="powerConsumption" required>

            <label for="locationId">Location ID:</label>
            <input type="number" id="locationId" name="locationId" required>

            <button type="submit">Add Device</button>
        </form>

        <!-- Add Sensor Form -->
        <h2>Add Sensor</h2>
        <form action="add_sensor.php" method="POST">
            <label for="sensorType">Sensor Type:</label>
            <input type="text" id="sensorType" name="sensorType" required>

            <label for="status">Status:</label>
            <select id="status" name="status" required>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>

            <label for="deviceId">Device ID:</label>
            <input type="number" id="deviceId" name="deviceId" required>

            <button type="submit">Add Sensor</button>
        </form>

        <!-- Add User Form -->
        <h2>Add User</h2>
        <form action="add_user.php" method="POST">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required>

            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" required>

            <label for="roleId">Role ID:</label>
            <input type="number" id="roleId" name="roleId" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Add User</button>
        </form>
    </div>
</body>
</html>
